<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberAlert | Login & Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Specific overrides for Auth Page */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .auth-container {
            width: 100%;
            max-width: 1000px;
            height: 600px;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            z-index: 10;
        }

        .auth-hero {
            flex: 1;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.4), rgba(6, 182, 212, 0.4));
            backdrop-filter: blur(20px);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-right: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        .auth-hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px var(--primary-light);
            background: linear-gradient(to right, #fff, var(--secondary-light));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-hero p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 80%;
        }

        .auth-forms-wrapper {
            flex: 1;
            position: relative;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
        }

        .form-section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 40px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.5s ease-in-out;
            opacity: 0;
            visibility: hidden;
            transform: translateX(50px);
        }

        .form-section.active {
            opacity: 1;
            visibility: visible;
            transform: translateX(0);
        }

        .form-section.left-out {
            transform: translateX(-50px);
        }

        .form-header {
            margin-bottom: 30px;
        }

        .form-header h2 {
            font-size: 2rem;
            color: white;
            margin-bottom: 5px;
        }

        .form-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .auth-form .form-group {
            margin-bottom: 20px;
        }

        .auth-form label {
            display: block;
            margin-bottom: 8px;
            color: var(--secondary-light);
            font-size: 0.9rem;
        }

        .auth-form input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .auth-form input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 10px rgba(129, 140, 248, 0.2);
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }

        .auth-btn:hover:not(:disabled) {
            background: var(--primary-light);
            transform: translateY(-2px);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .toggle-text {
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .toggle-text a {
            color: var(--secondary-light);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s;
        }

        .toggle-text a:hover {
            color: #fff;
        }

        /* Decorative circles for auth form */
        .decor-circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            filter: blur(40px);
            opacity: 0.4;
            z-index: -1;
        }

        .dc-1 { width: 300px; height: 300px; top: -100px; right: -100px; }
        .dc-2 { width: 200px; height: 200px; bottom: -50px; left: -50px; background: linear-gradient(135deg, var(--accent), var(--primary)); }

        @media (max-width: 768px) {
            .auth-container { flex-direction: column; height: 100vh; border-radius: 0; }
            .auth-hero { flex: 0.4; padding: 20px; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
            .auth-hero h1 { font-size: 2rem; }
            .auth-forms-wrapper { flex: 0.6; }
            .form-section { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="auth-container glass-panel">
        
        <div class="auth-hero">
            <i class="fas fa-shield-halved fa-5x mb-10" style="color: var(--secondary-light); text-shadow: 0 0 20px var(--secondary);"></i>
            <h1>CyberAlert</h1>
            <p>Modern, Efficient Digital Hub for Awareness on Frauds</p>
        </div>

        <div class="auth-forms-wrapper">
            <div class="decor-circle dc-1"></div>
            <div class="decor-circle dc-2"></div>

            <!-- Login Form -->
            <div id="login-section" class="form-section active">
                <div class="form-header">
                    <h2>Welcome Back</h2>
                    <p>Enter your credentials to access the intelligence hub.</p>
                </div>
                <form id="login-form" class="auth-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input id="login-email" type="email" required placeholder="admin@cyberalert.gov.in" value="admin@cyberalert.gov.in">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input id="login-password" type="password" required placeholder="••••••••" value="password123">
                    </div>
                    <button type="submit" class="auth-btn" id="login-btn">
                        Secure Login <i class="fas fa-arrow-right ml-10"></i>
                    </button>
                </form>
                <div class="toggle-text">
                    Don't have an account? <a onclick="toggleForm('register')">Register here</a>
                </div>
            </div>

            <!-- Register Form -->
            <div id="register-section" class="form-section">
                <div class="form-header">
                    <h2>Create Account</h2>
                    <p>Join the CyberAlert network to report and track frauds.</p>
                </div>
                <form id="register-form" class="auth-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input id="reg-name" type="text" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input id="reg-email" type="email" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label>Officer ID (optional)</label>
                        <input id="reg-officer" type="text" placeholder="OFF123">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input id="reg-password" type="password" required placeholder="••••••••" minlength="6">
                    </div>
                    <button type="submit" class="auth-btn" id="reg-btn">
                        Register Account <i class="fas fa-user-plus ml-10"></i>
                    </button>
                </form>
                <div class="toggle-text">
                    Already have an account? <a onclick="toggleForm('login')">Login here</a>
                </div>
            </div>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const API_BASE = '/api';

        // Toggle forms
        function toggleForm(target) {
            const loginSection = document.getElementById('login-section');
            const registerSection = document.getElementById('register-section');

            if (target === 'register') {
                loginSection.classList.remove('active');
                loginSection.classList.add('left-out');
                
                setTimeout(() => {
                    registerSection.classList.remove('left-out');
                    registerSection.classList.add('active');
                }, 100);
            } else {
                registerSection.classList.remove('active');
                registerSection.classList.add('left-out');
                
                setTimeout(() => {
                    loginSection.classList.remove('left-out');
                    loginSection.classList.add('active');
                }, 100);
            }
        }

        // Real backend auth
        async function handleAuth(type) {
            const isLogin = type === 'login';
            const form = isLogin ? document.getElementById('login-form') : document.getElementById('register-form');
            const btn = isLogin ? document.getElementById('login-btn') : document.getElementById('reg-btn');
            
            try {
                btn.disabled = true;
                btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${isLogin ? 'Logging in...' : 'Registering...'}`;

                Swal.fire({
                    title: isLogin ? 'Authenticating...' : 'Creating Account...',
                    text: 'Contacting CyberAlert servers...',
                    allowOutsideClick: false,
                    showConfirmButton: false,
                    background: '#0F172A',
                    color: '#fff',
                    backdrop: `rgba(15, 23, 42, 0.9)`
                });

                const data = isLogin ? {
                    email: document.getElementById('login-email').value,
                    password: document.getElementById('login-password').value
                } : {
                    name: document.getElementById('reg-name').value,
                    email: document.getElementById('reg-email').value,
                    officer_id: document.getElementById('reg-officer').value || null,
                    password: document.getElementById('reg-password').value
                };

                const response = await fetch(`${API_BASE}/${type}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                Swal.close();

                if (response.ok) {
                    sessionStorage.setItem('cyberalert_auth', 'true');
                    sessionStorage.setItem('cyberalert_user', JSON.stringify(result.user || { email: data.email }));
                    Swal.fire({
                        icon: 'success',
                        title: 'Success!',
                        text: result.message,
                        timer: 1500,
                        background: '#0F172A',
                        color: '#fff'
                    }).then(() => {
                        window.location.href = 'index.html';
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Error',
                        text: result.error || 'Something went wrong',
                        background: '#0F172A',
                        color: '#fff'
                    });
                }
            } catch (error) {
                Swal.close();
                Swal.fire({
                    icon: 'error',
                    title: 'Network Error',
                    text: 'Unable to connect to server. Check if backend is running.',
                    background: '#0F172A',
                    color: '#fff'
                });
                console.error('Auth error:', error);
            } finally {
                btn.disabled = false;
                btn.innerHTML = isLogin ? 'Secure Login <i class="fas fa-arrow-right ml-10"></i>' : 'Register Account <i class="fas fa-user-plus ml-10"></i>';
            }
        }

        // Form submit handlers
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            handleAuth('login');
        });

        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            handleAuth('register');
        });
    </script>
</body>
</html>
